name: uje
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.3.0
  fluttertoast: ^8.2.12
  loader_overlay: ^5.0.0
  google_fonts: ^6.2.1
