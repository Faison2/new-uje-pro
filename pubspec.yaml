flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.PNG
    - assets/logo.PNG
    - assets/launcher/ic_launcher.png

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/launcher/ic_launcher.png"